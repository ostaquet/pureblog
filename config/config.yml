# =============================================================================
# Blog engine configuration
# =============================================================================
# This file controls all blog-wide settings. Every field below is mandatory.
# When the engine starts it validates this file and reports a clear error if
# anything is missing. To use a different file, run:
#
#     python3 src/main.py --config path/to/your-config.yml
#
# =============================================================================

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------
# site_title : Human-readable name of the blog. Shown in <title>, the header
#              h1, the RSS feed and as default page title for the index pages.
# site_url   : Absolute base URL of the deployed site (no trailing slash).
#              Used for RSS <link>/<guid> elements. Update before deployment.
# author     : Name of the blog author. Injected into the page footer next to
#              the build-year (e.g. '© John Doe 2026').
# posts_dir  : Directory (relative to the project root) containing the source
#              Markdown posts named '{prefix}-{slug}.{lang}.md'.
# build_dir  : Directory where the static site is generated. It is wiped on
#              every build, so do not store source files here.
# assets_dir : Directory containing static assets (images, etc.) referenced
#              from posts. Its contents are copied verbatim into
#              'build/assets/' so that markdown links like
#              '![alt](assets/img/foo.png)' resolve at deploy time.
general:
  site_title: "Example's Blog"
  site_url: "https://example.com"
  author: "John Doe"
  posts_dir: "posts"
  build_dir: "build"
  assets_dir: "assets"

# -----------------------------------------------------------------------------
# SEO
# -----------------------------------------------------------------------------
# robots_file : Filename of the robots.txt. The file is used as template. The
#               sitemap directive will be automatically added during the
#               building of the website.
seo:
  robots_file: "seo/robots.txt"

# -----------------------------------------------------------------------------
# Languages
# -----------------------------------------------------------------------------
# codes               : List of ISO language codes the blog supports. Each
#                       post file must end with one of these codes (e.g.
#                       '001-hello.en.md').
# reading_time_labels : Localized suffix shown next to the reading-time number
#                       on post and index pages (e.g. "5 min read"). Every
#                       language listed in 'codes' must have an entry here.
# back_labels         : Localized "back to index" link shown at the top of
#                       each post page. Every language listed in 'codes' must
#                       have an entry here.
languages:
  codes:
    - en
    - fr
    - nl
  reading_time_labels:
    en: "min read"
    fr: "min de lecture"
    nl: "min leestijd"
  back_labels:
    en: "← Back"
    fr: "← Retour"
    nl: "← Terug"

# -----------------------------------------------------------------------------
# Publish
# -----------------------------------------------------------------------------
# default_timezone     : IANA timezone name applied to post dates when
#                        generating RSS pubDate values. Handles DST
#                        automatically. Examples: "Europe/Brussels", "UTC",
#                        "America/New_York".
# default_publish_hour : Hour-of-day (0-23) used as the publish time when a
#                        post date has no explicit time component.
publish:
  default_timezone: "Europe/Brussels"
  default_publish_hour: 13

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
# template_file : Filename of the page template. Uses $-style placeholders:
#                 $title, $lang, $lang_switcher, $description, $content,
#                 $root, $site_title, $author, $year.
# style_file    : Filename of the CSS stylesheet. Copied
#                 verbatim into the build directory as '/style.css'.
# favicon_emoji : Single emoji rendered as the site favicon. The build emits
#                 an SVG favicon at '/favicon.svg' containing this emoji and
#                 references it from every page via a <link rel="icon"> tag.
theme:
  template_file: "theme/template.html"
  style_file: "theme/style.css"
  favicon_emoji: "🌎"
